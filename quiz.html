<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuit Check — Electrical Units Quiz</title>
<style>
  :root{
    --bg: #0b1210;
    --panel: #111c19;
    --line: #1e3630;
    --copper: #d97a3f;
    --copper-bright: #ff9c52;
    --signal: #4fd6b0;
    --text: #eaf2ee;
    --text-dim: #93a8a1;
    --wrong: #e05c5c;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background:
      radial-gradient(circle at 20% 20%, rgba(79,214,176,0.05), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(217,122,63,0.06), transparent 45%),
      var(--bg);
    color: var(--text);
    font-family: 'Courier New', ui-monospace, monospace;
    min-height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 24px;
  }

  .board{
    width: 100%;
    max-width: 620px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 30px 60px -20px rgba(0,0,0,0.6);
  }

  .board::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.35;
    pointer-events:none;
  }

  header{
    padding: 28px 32px 20px;
    border-bottom: 1px dashed var(--line);
    position:relative;
  }

  .eyebrow{
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--signal);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 30px;
    margin: 0 0 6px;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .sub{
    color: var(--text-dim);
    font-size: 13px;
    margin:0;
  }

  .trace{
    position:absolute;
    right: 28px;
    top: 28px;
    width: 46px;
    height: 46px;
    border: 2px solid var(--copper);
    border-radius: 4px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 18px;
    color: var(--copper-bright);
  }

  main{
    padding: 28px 32px 32px;
    position: relative;
  }

  .progress{
    display:flex;
    gap:6px;
    margin-bottom: 22px;
  }
  .node{
    flex:1;
    height: 4px;
    background: var(--line);
    border-radius: 2px;
    overflow:hidden;
  }
  .node.done{ background: var(--signal); }
  .node.current{ background: var(--copper); }

  .qnum{
    color: var(--copper-bright);
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .question{
    font-size: 20px;
    color: var(--text);
    margin: 0 0 22px;
    line-height: 1.4;
  }

  .options{
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  .opt{
    display:flex;
    align-items:center;
    gap: 14px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text);
    padding: 14px 16px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 15px;
    text-align:left;
    cursor:pointer;
    transition: border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .opt:hover:not(:disabled){
    border-color: var(--signal);
    background: rgba(79,214,176,0.05);
  }
  .opt:active:not(:disabled){ transform: scale(0.99); }

  .opt .tag{
    color: var(--text-dim);
    font-size: 12px;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 2px 7px;
    flex-shrink:0;
  }

  .opt.correct{
    border-color: var(--signal);
    background: rgba(79,214,176,0.1);
  }
  .opt.correct .tag{ border-color: var(--signal); color: var(--signal); }

  .opt.wrong{
    border-color: var(--wrong);
    background: rgba(224,92,92,0.08);
  }
  .opt.wrong .tag{ border-color: var(--wrong); color: var(--wrong); }

  .opt:disabled{ cursor:default; }

  .feedback{
    min-height: 20px;
    margin-top: 16px;
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  .feedback.correct{ color: var(--signal); }
  .feedback.wrong{ color: var(--wrong); }

  .next-row{
    margin-top: 18px;
    display:flex;
    justify-content: flex-end;
  }

  .btn{
    background: var(--copper);
    color: #1a0f08;
    border: none;
    padding: 11px 22px;
    border-radius: 4px;
    font-family: inherit;
    font-weight: bold;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .btn:hover{ background: var(--copper-bright); }
  .btn:disabled{ opacity:0; pointer-events:none; }

  /* Results screen */
  .results{ text-align:center; }
  .results .eyebrow{ justify-content:center; }
  .score-ring{
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    margin: 20px auto 24px;
    position:relative;
  }
  .score-ring .num{
    font-size: 34px;
    color: var(--signal);
    font-family: Georgia, serif;
  }
  .score-ring .den{
    font-size: 12px;
    color: var(--text-dim);
  }
  .verdict{
    font-size: 16px;
    margin-bottom: 24px;
    color: var(--text);
  }
  .actions{
    display:flex;
    gap: 10px;
    justify-content:center;
    flex-wrap: wrap;
  }
  .btn.ghost{
    background: transparent;
    border: 1px solid var(--copper);
    color: var(--copper-bright);
  }
  .btn.ghost:hover{ background: rgba(217,122,63,0.1); }

  footer{
    text-align:center;
    font-size: 11px;
    color: var(--text-dim);
    padding: 14px;
    letter-spacing: 1px;
  }

  @media (max-width: 480px){
    header, main{ padding-left: 20px; padding-right: 20px; }
    h1{ font-size: 24px; }
    .trace{ width:36px; height:36px; right:20px; top:24px; font-size:15px;}
  }
</style>
</head>
<body>

<div class="board">
  <header>
    <div class="eyebrow">Circuit Check</div>
    <h1>Electrical Units Quiz</h1>
    <p class="sub">Five components. Five questions. No shortcuts.</p>
    <div class="trace">⏚</div>
  </header>

  <main id="quizArea">
    <div class="progress" id="progress"></div>
    <div class="qnum" id="qnum">QUESTION 01 / 05</div>
    <p class="question" id="questionText"></p>
    <div class="options" id="optionsArea"></div>
    <div class="feedback" id="feedback"></div>
    <div class="next-row">
      <button class="btn" id="nextBtn" disabled>Next →</button>
    </div>
  </main>

  <footer>BUILT WITH PYTHON LOGIC · RUN IN BROWSER</footer>
</div>

<script>
const questions = [
  { question: "Which unit measures electrical resistance?", options: ["Watt", "Henry", "Ohm"], answer: 2 },
  { question: "Which unit measures electrical power?", options: ["Watt", "Henry", "Ohm"], answer: 0 },
  { question: "Which unit measures inductance?", options: ["Watt", "Henry", "Ohm"], answer: 1 },
  { question: "Which unit measures capacitance?", options: ["Watt", "Farad", "Ohm"], answer: 1 },
  { question: "Which unit measures force?", options: ["Watt", "Henry", "Newton"], answer: 2 },
];

let current = 0;
let score = 0;
let locked = false;

const quizArea = document.getElementById('quizArea');
const progressEl = document.getElementById('progress');
const qnumEl = document.getElementById('qnum');
const questionText = document.getElementById('questionText');
const optionsArea = document.getElementById('optionsArea');
const feedback = document.getElementById('feedback');
const nextBtn = document.getElementById('nextBtn');

const letters = ['A', 'B', 'C', 'D'];

function renderProgress(){
  progressEl.innerHTML = '';
  questions.forEach((_, idx) => {
    const node = document.createElement('div');
    node.className = 'node';
    if(idx < current) node.classList.add('done');
    if(idx === current) node.classList.add('current');
    progressEl.appendChild(node);
  });
}

function renderQuestion(){
  locked = false;
  feedback.textContent = '';
  feedback.className = 'feedback';
  nextBtn.disabled = true;

  renderProgress();
  qnumEl.textContent = `QUESTION ${String(current+1).padStart(2,'0')} / ${String(questions.length).padStart(2,'0')}`;

  const q = questions[current];
  questionText.textContent = q.question;
  optionsArea.innerHTML = '';

  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="tag">${letters[idx]}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => selectAnswer(idx, btn));
    optionsArea.appendChild(btn);
  });
}

function selectAnswer(idx, btnEl){
  if(locked) return;
  locked = true;

  const q = questions[current];
  const allOpts = optionsArea.querySelectorAll('.opt');
  allOpts.forEach(b => b.disabled = true);

  if(idx === q.answer){
    btnEl.classList.add('correct');
    feedback.textContent = 'Correct — signal confirmed.';
    feedback.classList.add('correct');
    score++;
  } else {
    btnEl.classList.add('wrong');
    allOpts[q.answer].classList.add('correct');
    feedback.textContent = `Wrong — correct answer was ${q.options[q.answer]}.`;
    feedback.classList.add('wrong');
  }

  nextBtn.disabled = false;
}

nextBtn.addEventListener('click', () => {
  current++;
  if(current < questions.length){
    renderQuestion();
  } else {
    renderResults();
  }
});

function renderResults(){
  const pct = Math.round((score / questions.length) * 100);
  let verdict = "Needs a rewind — revisit the fundamentals.";
  if(pct === 100) verdict = "Full continuity. Perfect circuit.";
  else if(pct >= 60) verdict = "Solid connection — mostly on point.";

  quizArea.innerHTML = `
    <div class="results">
      <div class="eyebrow">Result</div>
      <div class="score-ring">
        <div class="num">${score}/${questions.length}</div>
        <div class="den">${pct}%</div>
      </div>
      <p class="verdict">${verdict}</p>
      <div class="actions">
        <button class="btn" id="retryBtn">Retry</button>
      </div>
    </div>
  `;
  document.getElementById('retryBtn').addEventListener('click', () => {
    current = 0;
    score = 0;
    renderQuestion();
  });
}

renderQuestion();
</script>

</body>
</html>
